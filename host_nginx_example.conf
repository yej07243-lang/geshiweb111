# =====================================================================
# INSTRUCTIONS FOR SERVER ADMIN:
# This file is a TEMPLATE for your host server's Nginx configuration.
# It should replace or be added to your existing easyformat.co config
# located at /etc/nginx/sites-available/easyformat.co (or similar).
# =====================================================================

server {
    listen 80;
    server_name easyformat.co www.easyformat.co;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name easyformat.co www.easyformat.co;

    # SSL Certificates (managed by Certbot usually)
    # ssl_certificate /etc/letsencrypt/live/easyformat.co/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/easyformat.co/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads (crucial for file converter)
    client_max_body_size 200M;

    location / {
        # Forward traffic to the Docker Nginx container running on port 8090
        proxy_pass http://127.0.0.1:8090;
        
        # Preserve original client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (often needed for Next.js features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}